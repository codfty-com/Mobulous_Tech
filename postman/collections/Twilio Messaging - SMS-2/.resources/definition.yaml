$kind: collection
name: Twilio Messaging / SMS
description: |-
  Ahoy!

  This Postman collection serves as a toolbelt for you to work with Twilio's [Programmable Messaging API](https://www.twilio.com/messaging).

  It provides functionality to interact with a subset of the Twilio API. For a more complete view of the API, make sure to visit our [Twilio Docs](https://www.twilio.com/docs/sms).

  Contact Support:
   Name: Twilio Support
   Email: support@twilio.com
