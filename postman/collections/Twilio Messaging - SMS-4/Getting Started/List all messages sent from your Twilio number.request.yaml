$kind: http-request
description: |-
  Retrieve a list of messages belonging to the account used to make the request. You can filter for example for only the messages that were sent from a specific phone number.

  Read more about it in the [Twilio Docs](https://www.twilio.com/docs/sms/api/message-resource#read-multiple-message-resources)
url: "{{2010-04-01-Accounts-AccountSid-Messages.json-Url}}/2010-04-01/Accounts/:AccountSid/Messages.json?From={{TWILIO_PHONE_NUMBER}}"
method: GET
queryParams:
  - key: To
    value: <string>
    disabled: true
    description: Read messages sent to only this phone number.
  - key: From
    value: "{{TWILIO_PHONE_NUMBER}}"
    description: Read messages sent from only this phone number or alphanumeric sender ID.
  - key: DateSent
    value: <dateTime>
    disabled: true
    description: "The date of the messages to show. Specify a date as `YYYY-MM-DD` in GMT to read only messages sent on this date. For example: `2009-07-06`. You can also specify an inequality, such as `DateSent<=YYYY-MM-DD`, to read messages sent on or before midnight on a date, and `DateSent>=YYYY-MM-DD` to read messages sent on or after midnight on a date."
  - key: DateSent<
    value: <dateTime>
    disabled: true
    description: "The date of the messages to show. Specify a date as `YYYY-MM-DD` in GMT to read only messages sent on this date. For example: `2009-07-06`. You can also specify an inequality, such as `DateSent<=YYYY-MM-DD`, to read messages sent on or before midnight on a date, and `DateSent>=YYYY-MM-DD` to read messages sent on or after midnight on a date."
  - key: DateSent>
    value: <dateTime>
    disabled: true
    description: "The date of the messages to show. Specify a date as `YYYY-MM-DD` in GMT to read only messages sent on this date. For example: `2009-07-06`. You can also specify an inequality, such as `DateSent<=YYYY-MM-DD`, to read messages sent on or before midnight on a date, and `DateSent>=YYYY-MM-DD` to read messages sent on or after midnight on a date."
  - key: PageSize
    value: <integer>
    disabled: true
    description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
pathVariables:
  - key: AccountSid
    value: "{{TWILIO_ACCOUNT_SID}}"
    description: (Required) The SID of the [Account](https://www.twilio.com/docs/iam/api/account) that created the Message resources to read.
auth:
  type: basic
  credentials:
    password: "{{TWILIO_AUTH_TOKEN}}"
    username: "{{TWILIO_ACCOUNT_SID}}"
scripts:
  - type: afterResponse
    code: |-
      var template = `
          <table bgcolor="#FFFFFF">
              <tr>
                  <th>To</th>
                  <th>Message Body</th>
                  <th>Sent at</th>
              </tr>

              {{#each messages}}
                  <tr>
                      <td>{{to}}</td>
                      <td>{{body}}</td>
                      <td>{{date_sent}}</td>
                  </tr>
              {{/each}}
          </table>
      `;

      // Set visualizer
      pm.visualizer.set(template, {
          // Pass the response body parsed as JSON as `data`
          messages: pm.response.json().messages
      });
    language: text/javascript
examples: ./.resources/List all messages sent from your Twilio number.resources/examples
order: 4000
